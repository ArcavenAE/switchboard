# dependabot.yml for Go projects
# Copy to .github/dependabot.yml
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "type.deps"
      - "agent.bot"

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    labels:
      - "type.deps"
      - "agent.bot"
